<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الادمن</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            text-align: center;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            color: #667eea;
            font-size: 2em;
        }
        
        .header-buttons {
            display: flex;
            gap: 10px;
        }
        
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            font-size: 1em;
        }
        
        .btn-refresh {
            background: #667eea;
            color: white;
        }
        
        .btn-refresh:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-language {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }
        
        .btn-language:hover {
            background: #f0f4ff;
        }
        
        .btn-back {
            background: #999;
            color: white;
        }
        
        .btn-back:hover {
            background: #777;
        }
        
        .admin-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
            border-left: 5px solid #667eea;
        }
        
        .stat-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .stat-label {
            font-size: 1em;
            color: #666;
        }
        
        .admin-panel {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .admin-panel h2 {
            color: #333;
            margin-bottom: 20px;
            text-align: right;
            border-bottom: 3px solid #667eea;
            padding-bottom: 15px;
        }
        
        .bookings-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .bookings-table th {
            background: #667eea;
            color: white;
            padding: 15px;
            text-align: right;
            font-weight: 600;
            border: 1px solid #ddd;
        }
        
        .bookings-table td {
            padding: 12px 15px;
            border: 1px solid #ddd;
            text-align: right;
        }
        
        .bookings-table tr:hover {
            background: #f9f9f9;
        }
        
        .status-badge {
            padding: 8px 12px;
            border-radius: 5px;
            font-size: 0.9em;
            font-weight: 600;
            display: inline-block;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-confirmed {
            background: #d4edda;
            color: #155724;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
            justify-content: center;
        }
        
        .btn-action {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .btn-confirm {
            background: #4caf50;
            color: white;
        }
        
        .btn-confirm:hover {
            background: #45a049;
            transform: scale(1.05);
        }
        
        .btn-delete {
            background: #f44336;
            color: white;
        }
        
        .btn-delete:hover {
            background: #da190b;
            transform: scale(1.05);
        }
        
        .no-bookings {
            text-align: center;
            color: #999;
            padding: 60px 20px;
            font-size: 1.3em;
        }
        
        .alert {
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        
        @keyframes slideIn {
            from {
                transform: translateY(-10px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .filter-section {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            justify-content: center;
        }
        
        .filter-btn {
            padding: 8px 15px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        
        .filter-btn.active {
            background: #667eea;
            color: white;
        }
        
        .filter-btn:hover {
            transform: translateY(-2px);
        }
        
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                gap: 15px;
            }
            
            header h1 {
                font-size: 1.5em;
            }
            
            .bookings-table {
                font-size: 0.9em;
            }
            
            .bookings-table th,
            .bookings-table td {
                padding: 8px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .filter-section {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="title">لوحة تحكم إدارة الحجوزات</h1>
            <div class="header-buttons">
                <button class="btn-refresh" onclick="refreshData()" id="btn-refresh">🔄 تحديث</button>
                <button class="btn-language" onclick="toggleLanguage()" id="btn-language">English</button>
                <button class="btn-back" onclick="goBack()">← العودة</button>
            </div>
        </header>
        
        <div id="alert" class="alert"></div>
        
        <div class="admin-stats">
            <div class="stat-box">
                <div class="stat-number" id="totalBookings">0</div>
                <div class="stat-label" id="stat-total">إجمالي الحجوزات</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="pendingBookings">0</div>
                <div class="stat-label" id="stat-pending">قيد الانتظار</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="confirmedBookings">0</div>
                <div class="stat-label" id="stat-confirmed">مؤكدة</div>
            </div>
        </div>
        
        <div class="admin-panel">
            <h2 id="heading-bookings">قائمة الحجوزات</h2>
            
            <div class="filter-section">
                <button class="filter-btn active" onclick="filterBookings('all')" id="filter-all">الكل</button>
                <button class="filter-btn" onclick="filterBookings('pending')" id="filter-pending">قيد الانتظار</button>
                <button class="filter-btn" onclick="filterBookings('confirmed')" id="filter-confirmed">مؤكدة</button>
            </div>
            
            <div id="bookingsContainer"></div>
        </div>
    </div>
    
    <script>
        let isArabic = true;
        let currentFilter = 'all';
        
        const translations = {
            ar: {
                title: 'لوحة تحكم إدارة الحجوزات',
                'btn-refresh': '🔄 تحديث',
                'btn-language': 'English',
                'btn-back': '← العودة',
                'stat-total': 'إجمالي الحجوزات',
                'stat-pending': 'قيد الانتظار',
                'stat-confirmed': 'مؤكدة',
                'heading-bookings': 'قائمة الحجوزات',
                'filter-all': 'الكل',
                'filter-pending': 'قيد الانتظار',
                'filter-confirmed': 'مؤكدة',
                'no-bookings': 'لا توجد حجوزات حالياً',
                'table-name': 'اسم المريض',
                'table-phone': 'رقم الهاتف',
                'table-email': 'البريد الإلكتروني',
                'table-doctor': 'الطبيب',
                'table-date': 'التاريخ والوقت',
                'table-status': 'الحالة',
                'table-notes': 'الملاحظات',
                'table-actions': 'الإجراءات',
                'btn-confirm': 'تأكيد',
                'btn-delete': 'حذف',
                'pending': 'قيد الانتظار',
                'confirmed': 'مؤكدة',
                'success': 'تم التحديث بنجاح!',
                'confirm-delete': 'هل أنت متأكد من حذف هذا الحجز؟',
                'deleted': 'تم حذف الحجز بنجاح',
                'confirmed-msg': 'تم تأكيد الحجز بنجاح'
            },
            en: {
                title: 'Bookings Management Panel',
                'btn-refresh': '🔄 Refresh',
                'btn-language': 'العربية',
                'btn-back': 'Back →',
                'stat-total': 'Total Bookings',
                'stat-pending': 'Pending',
                'stat-confirmed': 'Confirmed',
                'heading-bookings': 'Bookings List',
                'filter-all': 'All',
                'filter-pending': 'Pending',
                'filter-confirmed': 'Confirmed',
                'no-bookings': 'No bookings yet',
                'table-name': 'Patient Name',
                'table-phone': 'Phone',
                'table-email': 'Email',
                'table-doctor': 'Doctor',
                'table-date': 'Date & Time',
                'table-status': 'Status',
                'table-notes': 'Notes',
                'table-actions': 'Actions',
                'btn-confirm': 'Confirm',
                'btn-delete': 'Delete',
                'pending': 'Pending',
                'confirmed': 'Confirmed',
                'success': 'Updated successfully!',
                'confirm-delete': 'Are you sure you want to delete this booking?',
                'deleted': 'Booking deleted successfully',
                'confirmed-msg': 'Booking confirmed successfully'
            }
        };
        
        function toggleLanguage() {
            isArabic = !isArabic;
            const lang = isArabic ? 'ar' : 'en';
            const dir = isArabic ? 'rtl' : 'ltr';
            
            document.documentElement.lang = lang;
            document.documentElement.dir = dir;
            
            updateLanguage();
        }
        
        function updateLanguage() {
            const lang = isArabic ? 'ar' : 'en';
            const t = translations[lang];
            
            document.getElementById('title').textContent = t.title;
            document.getElementById('btn-refresh').textContent = t['btn-refresh'];
            document.getElementById('btn-language').textContent = t['btn-language'];
            document.getElementById('btn-back').textContent = t['btn-back'];
            document.getElementById('stat-total').textContent = t['stat-total'];
            document.getElementById('stat-pending').textContent = t['stat-pending'];
            document.getElementById('stat-confirmed').textContent = t['stat-confirmed'];
            document.getElementById('heading-bookings').textContent = t['heading-bookings'];
            document.getElementById('filter-all').textContent = t['filter-all'];
            document.getElementById('filter-pending').textContent = t['filter-pending'];
            document.getElementById('filter-confirmed').textContent = t['filter-confirmed'];
            
            loadAdminData();
        }
        
        function loadAdminData() {
            const lang = isArabic ? 'ar' : 'en';
            const t = translations[lang];
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const container = document.getElementById('bookingsContainer');
            
            // Update stats
            const pending = bookings.filter(b => !b.status || b.status === 'pending').length;
            const confirmed = bookings.filter(b => b.status === 'confirmed').length;
            
            document.getElementById('totalBookings').textContent = bookings.length;
            document.getElementById('pendingBookings').textContent = pending;
            document.getElementById('confirmedBookings').textContent = confirmed;
            
            // Filter bookings
            let filtered = bookings;
            if (currentFilter === 'pending') {
                filtered = bookings.filter(b => !b.status || b.status === 'pending');
            } else if (currentFilter === 'confirmed') {
                filtered = bookings.filter(b => b.status === 'confirmed');
            }
            
            container.innerHTML = '';
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="no-bookings">${t['no-bookings']}</div>`;
                return;
            }
            
            // Create table
            let tableHTML = `
                <table class="bookings-table">
                    <thead>
                        <tr>
                            <th>${t['table-name']}</th>
                            <th>${t['table-phone']}</th>
                            <th>${t['table-email']}</th>
                            <th>${t['table-doctor']}</th>
                            <th>${t['table-date']}</th>
                            <th>${t['table-status']}</th>
                            <th>${t['table-notes']}</th>
                            <th>${t['table-actions']}</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            filtered.forEach(booking => {
                const status = booking.status || 'pending';
                const statusText = status === 'confirmed' ? t.confirmed : t.pending;
                const statusClass = status === 'confirmed' ? 'status-confirmed' : 'status-pending';
                
                tableHTML += `
                    <tr>
                        <td><strong>${booking.patient}</strong></td>
                        <td>${booking.phone}</td>
                        <td>${booking.email}</td>
                        <td>${booking.doctor}</td>
                        <td>${booking.date} <br/> ${booking.time}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${booking.notes || '-'}</td>
                        <td>
                            <div class="action-buttons">
                                ${status !== 'confirmed' ? `<button class="btn-action btn-confirm" onclick="confirmBooking(${booking.id})">${t['btn-confirm']}</button>` : ''}
                                <button class="btn-action btn-delete" onclick="deleteBooking(${booking.id})">${t['btn-delete']}</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            tableHTML += `
                    </tbody>
                </table>
            `;
            
            container.innerHTML = tableHTML;
        }
        
        function confirmBooking(id) {
            const lang = isArabic ? 'ar' : 'en';
            const t = translations[lang];
            const bookings = JSON.parse(localStorage.getItem('bookings')) || [];
            const booking = bookings.find(b => b.id === id);
            
            if (booking) {
                booking.status = 'confirmed';
                localStorage.setItem('bookings', JSON.stringify(bookings));
                showAlert(t['confirmed-msg'], 'success');
                loadAdminData();
            }
        }
        
        function deleteBooking(id) {
            const lang = isArabic ? 'ar' : 'en';
            const t = translations[lang];
            
            if (confirm(t['confirm-delete'])) {
                let bookings = JSON.parse(localStorage.getItem('bookings')) || [];
                bookings = bookings.filter(b => b.id !== id);
                localStorage.setItem('bookings', JSON.stringify(bookings));
                showAlert(t['deleted'], 'success');
                loadAdminData();
            }
        }
        
        function filterBookings(filter) {
            currentFilter = filter;
            
            // Update active button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadAdminData();
        }
        
        function refreshData() {
            const lang = isArabic ? 'ar' : 'en';
            const t = translations[lang];
            showAlert(t.success, 'success');
            loadAdminData();
        }
        
        function goBack() {
            window.location.href = 'inex.html';
        }
        
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert ' + type;
            
            setTimeout(() => {
                alert.className = 'alert';
            }, 3000);
        }
        
        // Initialize
        loadAdminData();
    </script>
</body>
</html>
